name: Release workflow

on:
  release:
    types:
      - released
      - prereleased

jobs:
  push_verdaccio:
    name: Build Verdaccio custom image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ secrets.REGISTRY_URL }}/verdaccio-kuzzle"
          TAGS="$IMAGE:${{ github.ref_name }}"
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            # Moving tag so staging always pulls the latest prerelease
            TAGS="$TAGS,$IMAGE:develop"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          build-args: |
            VERDACCIO_KUZZLE_VERSION=${{ github.ref_name }}
          file: docker/Dockerfile
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
